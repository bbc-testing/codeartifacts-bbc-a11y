name: Test publish @bbc/a11y to CodeArtifact

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: "Version to publish (e.g. 3.0.0-codeartifact-test.1)"
        required: true
        type: string

      test_marker:
        description: "Marker stored inside package.json"
        required: true
        default: codeartifact-test
        type: string

      publish:
        description: "Actually publish package"
        required: true
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

concurrency:
  group: codeartifact-a11y-publish
  cancel-in-progress: false

jobs:

  publish:

    runs-on: ubuntu-latest

    timeout-minutes: 20

    env:
      AWS_REGION: ${{ vars.CODEARTIFACT_REGION }}
      CODEARTIFACT_DOMAIN: ${{ vars.CODEARTIFACT_DOMAIN }}
      CODEARTIFACT_DOMAIN_OWNER: ${{ vars.CODEARTIFACT_DOMAIN_OWNER }}
      CODEARTIFACT_REPOSITORY: ${{ vars.CODEARTIFACT_REPOSITORY }}

      AWS_ROLE_ARN: arn:aws:iam::461882383780:role/codeartifact/BBCCodeArtifactMachinePublisher

      EXPECTED_PACKAGE: "@bbc/a11y"

    steps:

      ##########################################################
      # Checkout
      ##########################################################

      - name: Checkout repository
        uses: actions/checkout@v4

      ##########################################################
      # Node
      ##########################################################

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      ##########################################################
      # Validate Environment
      ##########################################################

      - name: Validate workflow configuration

        shell: bash

        run: |

          set -euo pipefail

          required=(
            AWS_REGION
            CODEARTIFACT_DOMAIN
            CODEARTIFACT_DOMAIN_OWNER
            CODEARTIFACT_REPOSITORY
            AWS_ROLE_ARN
          )

          for item in "${required[@]}"; do

            if [[ -z "${!item:-}" ]]; then
              echo "::error::$item is missing"
              exit 1
            fi

          done

          if [[ ! "$CODEARTIFACT_DOMAIN_OWNER" =~ ^[0-9]{12}$ ]]; then
            echo "::error::Invalid AWS Account ID"
            exit 1
          fi

      ##########################################################
      # Validate package
      ##########################################################

      - name: Validate package

        shell: bash

        env:
          VERSION: ${{ inputs.package_version }}
          MARKER: ${{ inputs.test_marker }}

        run: |

          set -euo pipefail

          PACKAGE=$(node -p "require('./package.json').name")

          if [[ "$PACKAGE" != "$EXPECTED_PACKAGE" ]]; then
              echo "::error::Unexpected package name"

              echo "Expected : $EXPECTED_PACKAGE"
              echo "Actual   : $PACKAGE"

              exit 1
          fi

          if [[ ! "$VERSION" =~ ^3\.0\.0-codeartifact-test\.[0-9]+$ ]]; then
              echo "::error::Invalid version"

              exit 1
          fi

          npm version "$VERSION" \
            --no-git-tag-version \
            --ignore-scripts

      ##########################################################
      # Embed metadata
      ##########################################################

      - name: Embed metadata

        shell: bash

        env:
          MARKER: ${{ inputs.test_marker }}

        run: |

          node <<'EOF'

          const fs=require("fs");

          const pkg=require("./package.json");

          pkg.codeartifactTest={

              marker:process.env.MARKER,

              repository:process.env.GITHUB_REPOSITORY,

              ref:process.env.GITHUB_REF,

              sha:process.env.GITHUB_SHA,

              actor:process.env.GITHUB_ACTOR,

              workflow:process.env.GITHUB_WORKFLOW,

              runId:process.env.GITHUB_RUN_ID,

              attempt:process.env.GITHUB_RUN_ATTEMPT,

              timestamp:new Date().toISOString()

          };

          fs.writeFileSync(
              "package.json",
              JSON.stringify(pkg,null,2)+"\n"
          );

          EOF

      ##########################################################
      # Display package
      ##########################################################

      - name: Package information

        run: |

          node <<'EOF'

          console.log(
            JSON.stringify(
              require("./package.json"),
              null,
              2
            )
          )

          EOF

      ##########################################################
      # Pack
      ##########################################################

      - name: Create package tarball

        id: pack

        shell: bash

        run: |

          set -euo pipefail

          RESULT=$(npm pack --json --ignore-scripts)

          FILE=$(echo "$RESULT" | jq -r '.[0].filename')

          echo "package=$FILE" >> $GITHUB_OUTPUT

          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

          echo "Generated package"

          ls -lh "$FILE"

      - name: Show package contents

        run: |

          tar -tzf "${{ steps.pack.outputs.package }}"
      ##########################################################
      # Inspect GitHub OIDC Token
      ##########################################################

      - name: Inspect GitHub OIDC token

        uses: actions/github-script@v7

        with:
          script: |

            const token = await core.getIDToken("sts.amazonaws.com");

            const payload = JSON.parse(
              Buffer.from(
                token.split(".")[1],
                "base64url"
              ).toString()
            );

            core.startGroup("OIDC Claims");

            for (const [key,value] of Object.entries(payload)) {
              core.info(`${key}: ${value}`);
            }

            core.endGroup();

      ##########################################################
      # Configure AWS Credentials
      ##########################################################

      - name: Configure AWS credentials

        uses: aws-actions/configure-aws-credentials@v4

        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com
          role-session-name: codeartifact-publisher
          retry-max-attempts: 5
          mask-aws-account-id: true

      ##########################################################
      # Verify Identity
      ##########################################################

      - name: Verify AWS identity

        shell: bash

        run: |

          set -euo pipefail

          echo "::group::Caller Identity"

          aws sts get-caller-identity

          echo "::endgroup::"

          ARN=$(aws sts get-caller-identity \
              --query Arn \
              --output text)

          echo "Assumed ARN"

          echo "$ARN"

          if [[ "$ARN" != *":assumed-role/BBCCodeArtifactMachinePublisher/"* ]]; then

            echo "::error::Unexpected role assumed"

            exit 1

          fi

      ##########################################################
      # Verify CodeArtifact Domain
      ##########################################################

      - name: Verify CodeArtifact domain

        shell: bash

        run: |

          set -e

          aws codeartifact describe-domain \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER"

      ##########################################################
      # Verify Repository
      ##########################################################

      - name: Verify repository

        shell: bash

        run: |

          set -e

          aws codeartifact describe-repository \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --repository "$CODEARTIFACT_REPOSITORY"

      ##########################################################
      # Get Repository Endpoint
      ##########################################################

      - name: Get repository endpoint

        id: endpoint

        shell: bash

        run: |

          set -euo pipefail

          ENDPOINT=$(aws codeartifact get-repository-endpoint \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --repository "$CODEARTIFACT_REPOSITORY" \
            --format npm \
            --query repositoryEndpoint \
            --output text)

          echo "endpoint=$ENDPOINT" >> "$GITHUB_OUTPUT"

      ##########################################################
      # Get Authorization Token
      ##########################################################

      - name: Get authorization token

        id: auth

        shell: bash

        run: |

          set -euo pipefail

          TOKEN=$(aws codeartifact get-authorization-token \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --query authorizationToken \
            --output text)

          echo "::add-mask::$TOKEN"

          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      ##########################################################
      # Configure npm
      ##########################################################

      - name: Configure npm for CodeArtifact

        shell: bash

        run: |

          set -euo pipefail

          REGISTRY="${{ steps.endpoint.outputs.endpoint }}"

          HOST=${REGISTRY#https://}

          cat > "$RUNNER_TEMP/.npmrc" <<EOF
          registry=${REGISTRY}
          @bbc:registry=${REGISTRY}
          always-auth=true
          //${HOST}:_authToken=${{ steps.auth.outputs.token }}
          EOF

          chmod 600 "$RUNNER_TEMP/.npmrc"

          echo "NPM_CONFIG_USERCONFIG=$RUNNER_TEMP/.npmrc" >> $GITHUB_ENV

          echo "CODEARTIFACT_REGISTRY=$REGISTRY" >> $GITHUB_ENV

      ##########################################################
      # Verify npm Login
      ##########################################################

      - name: Verify npm authentication

        shell: bash

        run: |

          npm ping \
            --registry "$CODEARTIFACT_REGISTRY"

          npm config list
      ##########################################################
      # Verify Package Version
      ##########################################################

      - name: Ensure package version does not already exist

        shell: bash

        env:
          PACKAGE_VERSION: ${{ steps.pack.outputs.version }}

        run: |

          set -euo pipefail

          echo "Checking if version already exists..."

          set +e

          OUTPUT=$(aws codeartifact describe-package-version \
              --domain "$CODEARTIFACT_DOMAIN" \
              --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
              --repository "$CODEARTIFACT_REPOSITORY" \
              --format npm \
              --namespace bbc \
              --package a11y \
              --package-version "$PACKAGE_VERSION" \
              2>&1)

          EXIT_CODE=$?

          set -e

          if [[ $EXIT_CODE -eq 0 ]]; then

            echo "::error::Version already exists."

            exit 1

          fi

          if grep -q ResourceNotFoundException <<< "$OUTPUT"; then

            echo "Package version available."

          else

            echo "::error::Unexpected AWS response"

            echo "$OUTPUT"

            exit $EXIT_CODE

          fi

      ##########################################################
      # Dry Run Publish
      ##########################################################

      - name: Validate npm publish (dry-run)

        shell: bash

        run: |

          npm publish \
            "${{ steps.pack.outputs.package }}" \
            --ignore-scripts \
            --dry-run \
            --registry "$CODEARTIFACT_REGISTRY"

      ##########################################################
      # Publish Package
      ##########################################################

      - name: Publish package

        if: inputs.publish

        shell: bash

        run: |

          set -euo pipefail

          npm publish \
            "${{ steps.pack.outputs.package }}" \
            --ignore-scripts \
            --registry "$CODEARTIFACT_REGISTRY"

      ##########################################################
      # Verify Publish
      ##########################################################

      - name: Verify package in CodeArtifact

        if: inputs.publish

        shell: bash

        env:
          PACKAGE_VERSION: ${{ steps.pack.outputs.version }}

        run: |

          set -euo pipefail

          aws codeartifact describe-package-version \
              --domain "$CODEARTIFACT_DOMAIN" \
              --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
              --repository "$CODEARTIFACT_REPOSITORY" \
              --format npm \
              --namespace bbc \
              --package a11y \
              --package-version "$PACKAGE_VERSION"

      ##########################################################
      # Verify Using npm
      ##########################################################

      - name: Verify npm registry

        if: inputs.publish

        shell: bash

        env:
          PACKAGE_VERSION: ${{ steps.pack.outputs.version }}

        run: |

          npm view \
            "@bbc/a11y@$PACKAGE_VERSION" \
            version \
            name \
            dist.tarball \
            --registry "$CODEARTIFACT_REGISTRY"

      ##########################################################
      # Display Package Info
      ##########################################################

      - name: Package summary

        shell: bash

        run: |

          echo "::group::Package"

          echo "Package Name"

          node -p "require('./package.json').name"

          echo

          echo "Version"

          node -p "require('./package.json').version"

          echo

          echo "Registry"

          echo "$CODEARTIFACT_REGISTRY"

          echo "::endgroup::"
      ##########################################################
      # Cleanup npm credentials
      ##########################################################

      - name: Remove temporary npm credentials
        if: always()
        shell: bash
        run: |
          rm -f "$RUNNER_TEMP/.npmrc"

      ##########################################################
      # Upload package artifact
      ##########################################################

      - name: Upload generated package
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeartifact-package
          path: ${{ steps.pack.outputs.package }}
          if-no-files-found: ignore
          retention-days: 7

      ##########################################################
      # GitHub Step Summary
      ##########################################################

      - name: Write workflow summary
        if: always()

        shell: bash

        env:
          PACKAGE_VERSION: ${{ steps.pack.outputs.version }}

        run: |

          {
            echo "# CodeArtifact Publish Test"
            echo
            echo "## Package"
            echo
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Package | @bbc/a11y |"
            echo "| Version | ${PACKAGE_VERSION} |"
            echo "| Publish Requested | ${{ inputs.publish }} |"
            echo "| Test Marker | ${{ inputs.test_marker }} |"
            echo
            echo "## AWS"
            echo
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Region | ${AWS_REGION} |"
            echo "| Domain | ${CODEARTIFACT_DOMAIN} |"
            echo "| Repository | ${CODEARTIFACT_REPOSITORY} |"
            echo "| Role | ${AWS_ROLE_ARN} |"
            echo
            echo "## GitHub"
            echo
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Repository | ${GITHUB_REPOSITORY} |"
            echo "| Ref | ${GITHUB_REF} |"
            echo "| SHA | ${GITHUB_SHA} |"
            echo "| Actor | ${GITHUB_ACTOR} |"
            echo "| Workflow | ${GITHUB_WORKFLOW} |"
            echo "| Run | ${GITHUB_RUN_ID} |"

            if [[ "${{ inputs.publish }}" == "true" ]]; then
              echo
              echo "## Result"
              echo
              echo "✅ Package published successfully."
            else
              echo
              echo "## Result"
              echo
              echo "ℹ️ Dry-run completed successfully."
            fi

          } >> "$GITHUB_STEP_SUMMARY"

      ##########################################################
      # Success Banner
      ##########################################################

      - name: Success
        if: success()

        run: |

          echo ""
          echo "========================================="
          echo " CodeArtifact workflow completed"
          echo "========================================="
          echo ""
          echo "Package : @bbc/a11y"
          echo "Version : ${{ steps.pack.outputs.version }}"
          echo ""
          echo "Repository : $CODEARTIFACT_REPOSITORY"
          echo "Domain     : $CODEARTIFACT_DOMAIN"
          echo "Region     : $AWS_REGION"
          echo ""

      ##########################################################
      # Failure Diagnostics
      ##########################################################

      - name: Failure diagnostics
        if: failure()

        shell: bash

        run: |

          echo "::group::Environment"

          env | sort

          echo "::endgroup::"

          echo "::group::AWS"

          aws --version || true

          echo "::endgroup::"

          echo "::group::Node"

          node --version || true

          npm --version || true

          echo "::endgroup::"

          echo "::group::Package"

          cat package.json || true

          echo "::endgroup::"
