name: Test publish @bbc/a11y to CodeArtifact

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: "Unique test version, for example 3.0.0-codeartifact-test.1"
        required: true
        type: string
      test_marker:
        description: "Marker included in package.json to identify this build"
        required: true
        default: "first-test"
        type: string
      publish:
        description: "Publish package after validation"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: codeartifact-a11y-publish-test
  cancel-in-progress: false

jobs:
  validate-and-publish:
    name: Validate and publish
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      AWS_REGION: ${{ vars.CODEARTIFACT_REGION }}
      CODEARTIFACT_DOMAIN: ${{ vars.CODEARTIFACT_DOMAIN }}
      CODEARTIFACT_DOMAIN_OWNER: ${{ vars.CODEARTIFACT_DOMAIN_OWNER }}
      CODEARTIFACT_REPOSITORY: ${{ vars.CODEARTIFACT_REPOSITORY }}
      PUBLISHER_ROLE_ARN: arn:aws:iam::230027226493:role/CodeArtifact-Team-Publisher
      EXPECTED_PACKAGE_NAME: "@bbc/a11y"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required GitHub variables
        shell: bash
        run: |
          set -euo pipefail

          required_variables=(
            AWS_REGION
            CODEARTIFACT_DOMAIN
            CODEARTIFACT_DOMAIN_OWNER
            CODEARTIFACT_REPOSITORY
            PUBLISHER_ROLE_ARN
          )

          for variable_name in "${required_variables[@]}"; do
            if [[ -z "${!variable_name:-}" ]]; then
              echo "::error::Missing required value: ${variable_name}"
              exit 1
            fi
          done

          if [[ ! "$CODEARTIFACT_DOMAIN_OWNER" =~ ^[0-9]{12}$ ]]; then
            echo "::error::CODEARTIFACT_DOMAIN_OWNER must be a 12-digit AWS account ID"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          npm ci
          node -e "console.log('Electron binary:', require('electron'))"

      - name: Configure Electron sandbox and virtual display
        shell: bash
        run: |
          set -euo pipefail

          electron_package_dir="$(
            node -p "require('path').dirname(require.resolve('electron/package.json'))"
          )"
          chrome_sandbox="${electron_package_dir}/dist/chrome-sandbox"

          if [[ ! -f "$chrome_sandbox" ]]; then
            echo "::error::Electron chrome-sandbox was not found at ${chrome_sandbox}"
            exit 1
          fi

          sudo chown root:root "$chrome_sandbox"
          sudo chmod 4755 "$chrome_sandbox"

          sandbox_owner="$(stat -c '%U:%G' "$chrome_sandbox")"
          sandbox_mode="$(stat -c '%a' "$chrome_sandbox")"

          echo "Electron sandbox: ${chrome_sandbox}"
          echo "Owner: ${sandbox_owner}"
          echo "Mode: ${sandbox_mode}"

          if [[ "$sandbox_owner" != "root:root" || "$sandbox_mode" != "4755" ]]; then
            echo "::error::Electron sandbox permissions were not configured correctly"
            exit 1
          fi

          if ! command -v xvfb-run >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes xvfb
          fi

      - name: Validate package and prepare test version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ inputs.package_version }}
          TEST_MARKER: ${{ inputs.test_marker }}
        run: |
          set -euo pipefail

          actual_package_name="$(node -p "require('./package.json').name")"

          if [[ "$actual_package_name" != "$EXPECTED_PACKAGE_NAME" ]]; then
            echo "::error::Expected ${EXPECTED_PACKAGE_NAME}, found ${actual_package_name}"
            exit 1
          fi

          if [[ ! "$REQUESTED_VERSION" =~ ^3\.0\.0-codeartifact-test\.[0-9]+$ ]]; then
            echo "::error::Version must match 3.0.0-codeartifact-test.N"
            exit 1
          fi

          if [[ -z "$TEST_MARKER" ]]; then
            echo "::error::test_marker cannot be empty"
            exit 1
          fi

          npm version "$REQUESTED_VERSION" --no-git-tag-version

          node - <<'NODE'
          const fs = require("fs");
          const packageJson = JSON.parse(fs.readFileSync("package.json", "utf8"));

          packageJson.codeartifactTest = {
            marker: process.env.TEST_MARKER,
            repository: process.env.GITHUB_REPOSITORY,
            ref: process.env.GITHUB_REF,
            commit: process.env.GITHUB_SHA,
            runId: process.env.GITHUB_RUN_ID
          };

          fs.writeFileSync(
            "package.json",
            `${JSON.stringify(packageJson, null, 2)}\n`
          );
          NODE

          echo "Prepared package:"
          node - <<'NODE'
          const pkg = require("./package.json");
          console.log(JSON.stringify({
            name: pkg.name,
            version: pkg.version,
            codeartifactTest: pkg.codeartifactTest
          }, null, 2));
          NODE

      - name: Run package tests
        shell: bash
        env:
          CI: "true"
        run: |
          set -euo pipefail

          if node -e '
            const scripts = require("./package.json").scripts || {};
            process.exit(scripts.test ? 0 : 1);
          '; then
            xvfb-run --auto-servernum --server-args="-screen 0 1280x1024x24" npm test
          else
            echo "No npm test script is defined; skipping package tests."
          fi

      - name: Check npm package contents
        shell: bash
        run: |
          set -euo pipefail
          npm pack --dry-run

      - name: Inspect GitHub OIDC claims
        uses: actions/github-script@v7
        with:
          script: |
            const token = await core.getIDToken("sts.amazonaws.com");
            const tokenParts = token.split(".");

            if (tokenParts.length !== 3) {
              core.setFailed("GitHub returned an invalid OIDC token.");
              return;
            }

            const payload = JSON.parse(
              Buffer.from(tokenParts[1], "base64url").toString("utf8")
            );

            core.info(`OIDC issuer: ${payload.iss}`);
            core.info(`OIDC audience: ${payload.aud}`);
            core.info(`OIDC subject: ${payload.sub}`);
            core.info(`Repository: ${payload.repository}`);
            core.info(`Repository owner: ${payload.repository_owner}`);
            core.info(`Repository visibility: ${payload.repository_visibility}`);
            core.info(`Ref: ${payload.ref}`);
            core.info(`Environment: ${payload.environment || "not used"}`);
            core.info(`Job workflow ref: ${payload.job_workflow_ref}`);

      - name: Configure AWS credentials using GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.PUBLISHER_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com
          role-session-name: codeartifact-a11y-publish-test
          mask-aws-account-id: true
          retry-max-attempts: 3

      - name: Confirm assumed AWS identity
        shell: bash
        run: |
          set -euo pipefail

          assumed_arn="$(
            aws sts get-caller-identity \
              --query Arn \
              --output text
          )"

          echo "Assumed identity: ${assumed_arn}"

          if [[ "$assumed_arn" != *":assumed-role/CodeArtifact-Team-Publisher/"* ]]; then
            echo "::error::Unexpected assumed identity: ${assumed_arn}"
            exit 1
          fi

      - name: Retrieve CodeArtifact endpoint and authorization token
        shell: bash
        run: |
          set -euo pipefail

          repository_endpoint="$(
            aws codeartifact get-repository-endpoint \
              --domain "$CODEARTIFACT_DOMAIN" \
              --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
              --repository "$CODEARTIFACT_REPOSITORY" \
              --format npm \
              --query repositoryEndpoint \
              --output text
          )"

          authorization_token="$(
            aws codeartifact get-authorization-token \
              --domain "$CODEARTIFACT_DOMAIN" \
              --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
              --query authorizationToken \
              --output text
          )"

          if [[ -z "$repository_endpoint" || "$repository_endpoint" == "None" ]]; then
            echo "::error::CodeArtifact repository endpoint was not returned"
            exit 1
          fi

          if [[ -z "$authorization_token" || "$authorization_token" == "None" ]]; then
            echo "::error::CodeArtifact authorization token was not returned"
            exit 1
          fi

          registry_host_path="${repository_endpoint#https://}"

          {
            echo "registry=${repository_endpoint}"
            echo "@bbc:registry=${repository_endpoint}"
            echo "always-auth=true"
            echo "//${registry_host_path}:_authToken=${authorization_token}"
          } > "$RUNNER_TEMP/codeartifact.npmrc"

          chmod 600 "$RUNNER_TEMP/codeartifact.npmrc"
          echo "::add-mask::$authorization_token"
          echo "NPM_CONFIG_USERCONFIG=$RUNNER_TEMP/codeartifact.npmrc" >> "$GITHUB_ENV"
          echo "CODEARTIFACT_NPM_ENDPOINT=$repository_endpoint" >> "$GITHUB_ENV"
          echo "CodeArtifact npm endpoint configured successfully."

      - name: Confirm CodeArtifact repository access
        shell: bash
        run: |
          set -euo pipefail

          aws codeartifact describe-domain \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER"

          aws codeartifact describe-repository \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --repository "$CODEARTIFACT_REPOSITORY"

      - name: Confirm package version does not already exist
        shell: bash
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"

          set +e
          describe_output="$(
            aws codeartifact describe-package-version \
              --domain "$CODEARTIFACT_DOMAIN" \
              --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
              --repository "$CODEARTIFACT_REPOSITORY" \
              --format npm \
              --namespace bbc \
              --package a11y \
              --package-version "$package_version" \
              2>&1
          )"
          describe_exit_code=$?
          set -e

          if [[ "$describe_exit_code" -eq 0 ]]; then
            echo "::error::Version already exists: @bbc/a11y@${package_version}"
            exit 1
          fi

          if grep -q "ResourceNotFoundException" <<< "$describe_output"; then
            echo "Version is available: @bbc/a11y@${package_version}"
          else
            echo "::error::Unable to determine whether the package version exists"
            echo "$describe_output"
            exit "$describe_exit_code"
          fi

      - name: Publish package to CodeArtifact
        if: ${{ inputs.publish }}
        shell: bash
        run: |
          set -euo pipefail
          npm publish --registry "$CODEARTIFACT_NPM_ENDPOINT"

      - name: Verify published package version
        if: ${{ inputs.publish }}
        shell: bash
        run: |
          set -euo pipefail

          package_version="$(node -p "require('./package.json').version")"

          aws codeartifact describe-package-version \
            --domain "$CODEARTIFACT_DOMAIN" \
            --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --repository "$CODEARTIFACT_REPOSITORY" \
            --format npm \
            --namespace bbc \
            --package a11y \
            --package-version "$package_version"

          npm view \
            "@bbc/a11y@${package_version}" \
            name \
            version \
            dist.tarball \
            --registry "$CODEARTIFACT_NPM_ENDPOINT"

      - name: Dry-run result
        if: ${{ !inputs.publish }}
        shell: bash
        run: |
          echo "Dry run completed successfully. No package was published."

      - name: Write workflow summary
        if: always()
        shell: bash
        run: |
          package_version="$(
            node -p "require('./package.json').version" 2>/dev/null \
              || printf '%s' '${{ inputs.package_version }}'
          )"

          {
            echo "## CodeArtifact package test"
            echo
            echo "- Package: \`@bbc/a11y\`"
            echo "- Version: \`${package_version}\`"
            echo "- Marker: \`${{ inputs.test_marker }}\`"
            echo "- Publish requested: \`${{ inputs.publish }}\`"
            echo "- AWS role: \`${PUBLISHER_ROLE_ARN}\`"
            echo "- Domain: \`${CODEARTIFACT_DOMAIN}\`"
            echo "- Repository: \`${CODEARTIFACT_REPOSITORY}\`"
            echo "- GitHub repository: \`${GITHUB_REPOSITORY}\`"
            echo "- Git ref: \`${GITHUB_REF}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Remove temporary npm credentials
        if: always()
        shell: bash
        run: |
          rm -f "$RUNNER_TEMP/codeartifact.npmrc"
